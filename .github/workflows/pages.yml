name: Deploy Svelte frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "lib/**"
      - "svelte-frontend/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Use Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Build site
        run: nix build .#svelte-frontend-with-data-pages

      - name: Prepare publish dir
        run: |
          set -euo pipefail
          rm -rf public
          mkdir -p public
          cp -r result/. public/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
